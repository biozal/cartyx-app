name: Storybook

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: storybook-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy Storybook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook (with iframe.html fix)
        run: node scripts/build-storybook-with-iframe.mjs

      - name: Add Vercel SPA routing config
        run: |
          cat > storybook-static/vercel.json << 'EOF'
          {
            "rewrites": [{ "source": "/((?!iframe\\.html$).*)", "destination": "/index.html" }]
          }
          EOF

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: |
          vercel deploy storybook-static --prod --yes \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --scope ${{ secrets.VERCEL_ORG_ID }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_STORYBOOK_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
