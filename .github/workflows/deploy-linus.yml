name: Deploy to Linus

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

  deploy:
    name: Deploy to production server
    needs: quality
    runs-on: [self-hosted, linux, x64, linus]
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy to application directory
        run: |
          DEPLOY_DIR="/var/www/cartyx-app"

          # /var/www/cartyx-app must be pre-provisioned and owned by
          # the runner user during first-time server setup (see README).
          # This deploy step uses no sudo; nginx verification below may
          # use non-interactive sudo as a fallback.
          mkdir -p "$DEPLOY_DIR"

          # Sync files (exclude secrets, uploads, node_modules)
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude 'keys' \
            --exclude 'public/uploads' \
            ./ "$DEPLOY_DIR/"

          # Install dependencies and build in deploy directory
          cd "$DEPLOY_DIR"
          npm ci
          npm run build
          # Remove dev dependencies after build to save disk
          npm prune --omit=dev

          # Ensure uploads directory exists
          mkdir -p public/uploads/campaigns

          # Symlink .env and keys from secure location (force-replace to ensure
          # correct symlinks even if a stale file/dir was left from a prior deploy)
          if [ -f /var/www/cartyx-auth/.env ]; then
            ln -sfn /var/www/cartyx-auth/.env "$DEPLOY_DIR/.env"
          else
            echo "❌ /var/www/cartyx-auth/.env not found — cannot deploy without config."
            echo "   See README for first-time server setup instructions."
            exit 1
          fi

          # Validate critical env vars are set (source through grep to avoid
          # eval-ing the entire .env — just check for non-empty values).
          if ! grep -qE '^SESSION_SECRET=.+' /var/www/cartyx-auth/.env; then
            echo "❌ SESSION_SECRET is missing or empty in .env — refusing to deploy."
            exit 1
          fi
          if ! grep -qE '^MONGODB_URI=.+' /var/www/cartyx-auth/.env; then
            echo "❌ MONGODB_URI is missing or empty in .env — refusing to deploy."
            exit 1
          fi
          if [ -d /var/www/cartyx-auth/keys ]; then
            # Remove a non-symlink directory if it exists (ln -sfn can't
            # atomically replace a real directory)
            if [ -e "$DEPLOY_DIR/keys" ] && [ ! -L "$DEPLOY_DIR/keys" ]; then
              rm -rf "$DEPLOY_DIR/keys"
            fi
            ln -sfn /var/www/cartyx-auth/keys "$DEPLOY_DIR/keys"
          fi

      - name: Restart application
        run: |
          DEPLOY_DIR="/var/www/cartyx-app"
          cd "$DEPLOY_DIR"

          # PM2 is installed globally under nvm, which isn't on the GitHub
          # Actions runner's default PATH. Add nvm's default Node bin dir.
          if ! command -v pm2 >/dev/null 2>&1 && [ -d "$HOME/.nvm" ]; then
            export NVM_DIR="$HOME/.nvm"
            # shellcheck source=/dev/null
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" --no-use
            NVM_DEFAULT="$(nvm which default 2>/dev/null || true)"
            if [ -n "$NVM_DEFAULT" ]; then
              export PATH="$(dirname "$NVM_DEFAULT"):$PATH"
            fi
          fi
          if ! command -v pm2 >/dev/null 2>&1; then
            echo "❌ PM2 not found. Install it with: npm install -g pm2"
            exit 1
          fi

          # Check if PM2 process exists, update or start
          if pm2 describe cartyx-app > /dev/null 2>&1; then
            pm2 restart cartyx-app --update-env
          else
            pm2 start dist/server/server.js --name cartyx-app
            pm2 save
          fi

          # Wait for app to be healthy (retry up to 5 times with backoff)
          MAX_ATTEMPTS=5
          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            sleep "$i"
            HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/ || true)
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Deploy successful — app responding with HTTP $HTTP_STATUS"
              exit 0
            fi
            if [ "$i" -lt "$MAX_ATTEMPTS" ]; then
              echo "⏳ Attempt $i/$MAX_ATTEMPTS: HTTP $HTTP_STATUS — retrying in $((i+1))s..."
            else
              echo "⏳ Attempt $i/$MAX_ATTEMPTS: HTTP $HTTP_STATUS"
            fi
          done
          echo "❌ Deploy may have failed — app not responding with HTTP 200 after $MAX_ATTEMPTS attempts"
          pm2 logs cartyx-app --lines 20 --nostream
          exit 1

      - name: Verify nginx configuration
        run: |
          DEPLOY_DIR="/var/www/cartyx-app"
          # Verify nginx is installed and accessible before checking config.
          if ! command -v nginx >/dev/null 2>&1; then
            echo "⚠️  nginx is not installed or not in PATH; skipping config verification."
            exit 0
          fi
          # Check if nginx config references the deploy directory.
          # Capture the full config dump once to avoid running nginx -T multiple times.
          NGINX_DUMP=""
          if NGINX_DUMP=$(nginx -T 2>/dev/null); then
            : # success without sudo
          elif NGINX_DUMP=$(sudo -n nginx -T 2>/dev/null); then
            : # success with non-interactive sudo
          else
            echo "⚠️  Unable to read nginx config (neither 'nginx -T' nor 'sudo -n nginx -T' succeeded)."
            echo "    Skipping nginx verification. Run 'nginx -T' manually to check."
            exit 0
          fi
          if printf '%s\n' "$NGINX_DUMP" | grep -q "${DEPLOY_DIR}/public"; then
            echo "✅ Nginx is configured to serve from ${DEPLOY_DIR}/public"
          else
            echo "⚠️  Nginx does not appear to serve from ${DEPLOY_DIR}/public."
            echo "    Please update your nginx configuration manually and reload nginx."
            echo "    This workflow does NOT modify nginx — infrastructure changes are manual."
          fi
