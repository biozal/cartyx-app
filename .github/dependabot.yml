version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    target-branch: 'dev'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore(deps)'
    ignore:
      # Only accept patch and minor updates for major version packages
      - dependency-name: 'mongoose'
        update-types: ['version-update:semver-major']

      # --- FontAwesome 7 boundary ---
      # FontAwesome 7 is a major architectural rewrite that breaks
      # compatibility with @fortawesome/react-fontawesome v3 and our
      # pro-solid-svg-icons vendor bundle. Hold at v6 until the full
      # FontAwesome 7 ecosystem (react-fontawesome, icon packages) is stable.
      - dependency-name: '@fortawesome/fontawesome-svg-core'
        versions: ['>=7.0.0']

      # --- Vite 8 boundary: these versions require Vite 8 / Rolldown ---
      # Vite 8 switches from Rollup to Rolldown and breaks our React Compiler
      # babel plugin setup in vite.config.ts. Hold at Vite 7 until React
      # Compiler has native Rolldown/Oxc support.
      - dependency-name: 'vite'
        versions: ['>=8.0.0']
      # plugin-react 5.2+ requires Vite 8; 6.x removes Babel entirely,
      # which breaks babel-plugin-react-compiler integration.
      - dependency-name: '@vitejs/plugin-react'
        versions: ['>=5.2.0']
      # vitest 5+ will likely require Vite 8 (vitest 4.x supports Vite 7)
      - dependency-name: 'vitest'
        versions: ['>=5.0.0']
      - dependency-name: '@vitest/coverage-v8'
        versions: ['>=5.0.0']
      - dependency-name: '@vitest/browser-playwright'
        versions: ['>=5.0.0']

  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'dev'
    schedule:
      interval: 'weekly'
      day: 'monday'
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore(actions)'
